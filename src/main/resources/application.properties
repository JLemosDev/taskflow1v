# ============================================================
# TaskFlow API - Configurações da Aplicação
# ============================================================

# ── Servidor ────────────────────────────────────────────────
server.port=8080

# ── Banco de Dados H2 (em memória) ──────────────────────────
spring.datasource.url=jdbc:h2:file:./data/taskflow_db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── Console do H2 (acessível em http://localhost:8080/h2-console) ──
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# create-drop: recria o schema a cada inicialização (ideal para desenvolvimento)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Inicialização de dados ───────────────────────────────────
# Desabilita o data.sql automático; usaremos CommandLineRunner nos Services
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# ── Springdoc / Swagger ─────────────────────────────────────
# Swagger UI: http://localhost:8080/swagger-ui.html
# JSON:       http://localhost:8080/v3/api-docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# ── Serialização JSON ────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
